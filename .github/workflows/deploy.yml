name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # wrangler 4.x requires Node >= 22.
  NODE_VERSION: "22"

jobs:
  ci:
    name: Typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, test
        run: pnpm turbo run typecheck test

  deploy-api:
    name: Deploy api → Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Save pre-migration timestamp
        id: bookmark
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Apply D1 migrations
        id: migrate
        run: pnpm --filter @hahaton/api exec wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Rollback D1 on migration failure
        if: failure() && steps.migrate.outcome == 'failure' && steps.bookmark.outputs.ts
        run: |
          echo "::error::Migration failed — rolling back to ${{ steps.bookmark.outputs.ts }}"
          pnpm --filter @hahaton/api exec wrangler d1 time-travel restore DB --timestamp=${{ steps.bookmark.outputs.ts }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets
        run: |
          # Only push a secret when it's non-empty (optional ones like Product Hunt
          # may be unset) — and pass values via env, not inline, to avoid breakage.
          put() { if [ -n "$2" ]; then printf '%s' "$2" | pnpm --filter @hahaton/api exec wrangler secret put "$1" --env=""; else echo "skip $1 (empty)"; fi; }
          put LLM_GATEWAY_BASE_URL "$S_LLM_BASE"
          put LLM_GATEWAY_API_KEY "$S_LLM_KEY"
          put GOOGLE_SEARCH_API_KEY "$S_SERP"
          put PRODUCTHUNT_TOKEN "$S_PH"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          S_LLM_BASE: ${{ secrets.LLM_GATEWAY_BASE_URL }}
          S_LLM_KEY: ${{ secrets.LLM_GATEWAY_API_KEY }}
          S_SERP: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          S_PH: ${{ secrets.PRODUCTHUNT_TOKEN }}

      - name: Deploy api Worker
        run: pnpm --filter @hahaton/api exec wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-web:
    name: Deploy web → Cloudflare (OpenNext)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @hahaton/web exec opennextjs-cloudflare build
        env:
          # next.config.ts rewrites + the runs/[id] server fetch read process.env.API_URL
          # (server-side, so no NEXT_PUBLIC_ prefix). Mismatched names baked
          # http://localhost:8787 into the prod rewrite → /api/* returned 500.
          API_URL: ${{ secrets.API_URL }}

      - name: Deploy web
        run: pnpm --filter @hahaton/web exec opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
